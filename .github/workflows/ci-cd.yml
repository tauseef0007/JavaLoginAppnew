name: Java App CI/CD Pipeline
 
on:
  push:
    branches: [ main ]   # main push hone par trigger
  pull_request:
    branches: [ main ]
 
env:
  IMAGE_NAME: java-login-app
 
jobs:
 
  # ── JOB 1: SAST ──────────────────────────────────────
  sast:
    name: SAST - Code Security Scan
    runs-on: ubuntu-latest  # GitHub ka fresh Ubuntu machine
    steps:
    - uses: actions/checkout@v4        # Code download karo
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: SpotBugs SAST
      run: mvn compile spotbugs:check -DskipTests || true
    - name: OWASP Dependency Check
      run: mvn dependency-check:check || true
      # || true = error pe bhi pipeline continue kare
    - uses: actions/upload-artifact@v4  # v4 use karo! v3 deprecated hai
      if: always()
      with:
        name: sast-report
        path: reports/
 
  # ── JOB 2: BUILD & PUSH ──────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: sast              # SAST ke baad chalega
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build WAR
      run: mvn clean package -DskipTests
    - name: DockerHub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} 


         
          
 
  # ── JOB 3: DAST ──────────────────────────────────────
  dast:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Start App
      run: |
        docker run -d --name java-app -p 8080:8080 \
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
        sleep 30
    - uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://localhost:8080'
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dast-report
        path: report_html.html
 
  # ── JOB 4: UPDATE K8s MANIFEST ───────────────────────
  update-k8s:
    runs-on: ubuntu-latest
    needs: dast
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # GITHUB_TOKEN = auto token — Settings mein write permission chahiye
    - name: Update Image Tag
      run: |
        sed -i "s|image:.*java-login-app.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/java-login-app:${{ github.sha }}|g" k8s/deployment.yaml
        
